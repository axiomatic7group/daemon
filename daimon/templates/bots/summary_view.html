{% extends "base.html" %}

{% block sidebar_content %}
    <form name='edit_form' id='edit_form' action='' method='post'>
        {% csrf_token %}

        <input type="submit" value="Edit">

    </form>

{% endblock %}

{% block content %}



{% if summary_form %}
<div class="form_div" >
    <form name='summary_form' id='summary_form' action='' method='post'>
        {% csrf_token %}

        {{summary_form.as_p|safe}}

        <input type="submit" value="post">

    </form>
</div>
{% else %}

<div class="chat_summary">
    {{chat_summary|safe}}
</div>

{% endif %}
{% endblock %}
